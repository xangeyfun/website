<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>503 - Service Unavailable</title>
        <meta name="robots" content="noindex, follow">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <link rel="icon" href="{{ url_for('static', filename='Images/favicon.png') }}" type="image/png">
    </head>
    <body>
        <div class="container">
            <h1>503</h1>
            <p class="bio" id="reason">coming up with an excuse...</p>
            <div class="buttons">
                <a href="/" class="btn" aria-label="Home">
                    <img src="{{ url_for('static', filename='Images/home.png') }}" alt="Home">
                </a>
            </div>
        </div>
        <script>
            fetch("https://naas.isalman.dev/no")
            .then(r => r.json())
            .then(d => new Promise(resolve => setTimeout(() => resolve(d), 1000)))
            .then(d => {
                document.getElementById("reason").textContent = d.reason;
            });
        </script>
    </body>
</html>
